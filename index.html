<style>
  :root{
    --vino:#5C1A2B; --vino-dark:#3A1220; --beige:#EDE3D3; --rosa-vieja:#C99DA3;
    --rosa-suave:#E7CFCF; --cream:#F7F0E6; --gold:#B08D57; --leaf:#7C9A6C;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body{ height:100%; overflow:hidden; background:var(--vino-dark); touch-action:none; }
  body{ font-family:'Jost', sans-serif; color:var(--cream); }

  #gameContainer{ position:fixed; inset:0; z-index:0; }
  #gameContainer canvas{ display:block; width:100%; height:100%; }

  /* ---------- vignette + letterbox (look cinematográfico) ---------- */
  #vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 45%, rgba(20,5,10,0.55) 100%);
  }
  .letterbox{ position:fixed; left:0; right:0; height:5.5vh; background:#0d0407; z-index:6; pointer-events:none; }
  #letterboxTop{ top:0; } #letterboxBottom{ bottom:0; }

  /* ---------- HUD ---------- */
  #hud{ position:fixed; inset:0; z-index:5; pointer-events:none; opacity:0; transition:opacity 1.2s ease; }
  #hud.show{ opacity:1; }
  #counter{
    position:fixed; top:calc(5.5vh + 14px); left:16px; font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:13px; letter-spacing:.05em; color:var(--rosa-suave); pointer-events:none;
    text-shadow:0 2px 6px rgba(0,0,0,.6);
  }
  #menuBtn{
    position:fixed; top:calc(5.5vh + 10px); right:14px; width:38px; height:38px; border-radius:50%;
    background:rgba(58,18,32,0.55); border:1px solid rgba(237,227,211,0.4); color:var(--cream);
    font-size:15px; display:flex; align-items:center; justify-content:center; pointer-events:auto; cursor:pointer;
    backdrop-filter:blur(4px);
  }
  #musicBtn{
    position:fixed; top:calc(5.5vh + 10px); right:60px; width:38px; height:38px; border-radius:50%;
    background:rgba(58,18,32,0.55); border:1px solid rgba(237,227,211,0.4); color:var(--cream);
    font-size:16px; display:flex; align-items:center; justify-content:center; pointer-events:auto; cursor:pointer;
    backdrop-filter:blur(4px); transition:all .3s ease;
  }
  #musicBtn.playing{ background:var(--gold); color:var(--vino-dark); border-color:var(--gold); animation:pulse 2s infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.05); } }
  #prompt{
    position:fixed; bottom:calc(5.5vh + 34px); left:0; right:0; text-align:center; pointer-events:none;
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:1rem; color:var(--cream);
    opacity:0; transition:opacity .4s ease; text-shadow:0 2px 8px rgba(0,0,0,.7);
  }
  #prompt.show{ opacity:1; }
  #prompt span{
    display:inline-block; padding:8px 20px; border:1px solid rgba(237,227,211,0.55); border-radius:20px;
    background:rgba(58,18,32,0.4); backdrop-filter:blur(3px);
  }

  /* joystick */
  #joyBase{
    position:fixed; bottom:calc(5.5vh + 26px); left:26px; width:104px; height:104px; border-radius:50%;
    background:rgba(237,227,211,0.10); border:1px solid rgba(237,227,211,0.4); pointer-events:auto;
    backdrop-filter:blur(2px);
  }
  #joyStick{
    position:absolute; top:50%; left:50%; width:46px; height:46px; border-radius:50%;
    background:rgba(201,157,163,0.75); border:1px solid rgba(237,227,211,0.7);
    transform:translate(-50%,-50%);
  }
  #lookHint{
    position:fixed; bottom:calc(5.5vh + 32px); right:26px; font-size:10px; letter-spacing:.2em; text-transform:uppercase;
    color:rgba(237,227,211,0.65); text-align:right; max-width:100px; pointer-events:none;
  }

  /* ---------- INTRO ---------- */
  #intro{
    position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:8vh 8vw; background:linear-gradient(180deg, rgba(58,18,32,0.88), rgba(92,26,43,0.82) 55%, rgba(58,18,32,0.9));
    backdrop-filter:blur(10px);
    transition:opacity 1.6s ease, backdrop-filter 1.6s ease, visibility 0s linear 1.6s;
  }
  #intro.hide{ opacity:0; pointer-events:none; backdrop-filter:blur(0px); visibility:hidden; }
  #intro .eyebrow{ letter-spacing:.35em; font-size:11px; text-transform:uppercase; color:var(--rosa-vieja); margin-bottom:18px;}
  #intro h1{ font-family:'Parisienne', cursive; font-weight:400; font-size:clamp(2.2rem,10vw,3.2rem); margin-bottom:26px;}
  #intro .msg-box{ font-family:'Cormorant Garamond', serif; font-size:clamp(1.15rem,5vw,1.55rem); line-height:1.7;
    max-width:520px; min-height:150px; margin-bottom:12px;}
  #intro .msg-box .line{ display:block; margin-bottom:.35em; }
  #intro .cursor{ display:inline-block; width:2px; height:1em; background:var(--rosa-vieja); vertical-align:middle;
    margin-left:2px; animation:blink .9s steps(1) infinite;}
  @keyframes blink{ 50%{ opacity:0; } }
  #enterBtn{
    margin-top:26px; font-family:'Jost', sans-serif; letter-spacing:.18em; text-transform:uppercase; font-size:12px;
    color:var(--vino-dark); background:var(--rosa-vieja); border:none; padding:15px 34px; border-radius:2px;
    cursor:pointer; opacity:0; transition:opacity .8s ease; box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #enterBtn.show{ opacity:1; }
  #loadingNote{ margin-top:16px; font-size:11px; letter-spacing:.1em; color:rgba(237,227,211,0.6); }

  /* ---------- MENU (teleport) ---------- */
  #menuPanel{
    position:fixed; top:0; right:0; bottom:0; width:min(78vw,300px); z-index:15;
    background:linear-gradient(180deg, var(--cream), #F1E7D8); color:var(--vino-dark);
    padding:calc(5.5vh + 26px) 22px 26px; transform:translateX(100%); transition:transform .5s cubic-bezier(.2,.8,.3,1);
    box-shadow:-10px 0 30px rgba(0,0,0,.35); overflow-y:auto;
  }
  #menuPanel.open{ transform:translateX(0); }
  #menuPanel h3{ font-family:'Parisienne', cursive; font-size:1.6rem; color:var(--vino); margin-bottom:18px;}
  .menuItem{
    display:flex; align-items:center; justify-content:space-between; padding:12px 0;
    border-bottom:1px solid rgba(176,141,87,0.3); font-family:'Cormorant Garamond', serif; font-size:1.05rem;
  }
  .menuItem button{
    font-family:'Jost', sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    background:var(--vino); color:var(--cream); border:none; padding:8px 14px; border-radius:20px; cursor:pointer;
  }
  #closeMenu{
    position:absolute; top:calc(5.5vh + 20px); left:20px; background:none; border:none; font-size:20px;
    color:var(--vino); cursor:pointer;
  }

  /* ---------- OVERLAYS (foto / carta) ---------- */
  .overlay{
    position:fixed; inset:0; z-index:25; display:flex; align-items:center; justify-content:center; padding:8vh 7vw;
    background:rgba(20,6,11,0.72); backdrop-filter:blur(8px);
    opacity:0; pointer-events:none; transition:opacity .6s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .closeX{
    position:absolute; top:calc(5.5vh + 18px); right:22px; width:34px; height:34px; border-radius:50%;
    background:rgba(58,18,32,0.5); border:1px solid rgba(237,227,211,0.4); color:var(--cream);
    font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }

  .polaroid-big{ background:var(--cream); padding:16px 16px 26px; border-radius:2px; box-shadow:0 24px 50px rgba(0,0,0,.5);
    max-width:340px; width:100%; transform:rotate(-1.4deg); }
  .polaroid-big #photoImg{ width:100%; aspect-ratio:4/5; object-fit:cover; border-radius:2px; }
  .polaroid-big figcaption{ font-family:'Parisienne', cursive; color:var(--vino-dark); font-size:1.25rem; text-align:center; margin-top:12px;}
  .polaroid-big .why{ font-family:'Cormorant Garamond', serif; font-style:italic; color:var(--vino); font-size:.92rem;
    text-align:center; margin-top:6px; opacity:.9; line-height:1.5; }

  .letter-card{ position:relative; max-width:460px; width:100%; background:linear-gradient(180deg, var(--cream), #F1E7D8);
    color:var(--vino-dark); border-radius:3px; padding:40px 30px 32px; box-shadow:0 30px 60px rgba(0,0,0,.5); }
  .letter-card::before{ content:""; position:absolute; inset:10px; border:1px solid rgba(176,141,87,0.5); pointer-events:none;}
  .sprig{ display:flex; justify-content:center; margin-bottom:12px; }
  .sprig svg{ width:56px; }
  .letter-card h2{ font-family:'Parisienne', cursive; font-weight:400; font-size:1.8rem; text-align:center; margin-bottom:16px; color:var(--vino);}
  .letter-card p{ font-family:'Cormorant Garamond', serif; font-size:1.02rem; line-height:1.75; margin-bottom:12px;}
  .signature{ font-family:'Parisienne', cursive; font-size:1.4rem; color:var(--vino); text-align:right; margin-top:16px;}
  .seal{ width:48px; height:48px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #C9A46B, var(--gold) 70%, #8a6a3a);
    display:flex; align-items:center; justify-content:center; margin:22px auto 0; box-shadow:0 6px 14px rgba(0,0,0,.35);
    font-family:'Cormorant Garamond', serif; font-style:italic; color:var(--vino-dark); font-size:1rem; }

  #toast{
    position:fixed; bottom:calc(5.5vh + 90px); left:50%; transform:translateX(-50%) translateY(10px);
    background:rgba(58,18,32,0.85); border:1px solid rgba(237,227,211,0.35); padding:10px 20px; border-radius:20px;
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:.9rem; color:var(--cream);
    z-index:30; opacity:0; transition:opacity .4s ease, transform .4s ease; pointer-events:none; text-align:center; max-width:82vw;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <div id="gameContainer"></div>
  <div id="vignette"></div>
  <div class="letterbox" id="letterboxTop"></div>
  <div class="letterbox" id="letterboxBottom"></div>

  <div id="hud">
    <div id="counter">✦ Recuerdos encontrados: <span id="countNum">0</span>/8</div>
    <button id="menuBtn">☰</button>
    <button id="musicBtn" title="Música">🎵</button>
    <div id="prompt"><span id="promptText">Toca para ver</span></div>
    <div id="joyBase"><div id="joyStick"></div></div>
    <div id="lookHint">Arrastra la pantalla<br>para mirar alrededor</div>
  </div>

  <!-- ============ INTRO ============ -->
  <div id="intro">
    <div class="eyebrow">Para ti</div>
    <!-- 🔧 nombre -->
    <h1 id="introTitle">Feliz Cumpleaños, Elize</h1>
    <div class="msg-box" id="typedMsg"></div>
    <div id="loadingNote">preparando el jardín…</div>
    <button id="enterBtn">Entrar al jardín</button>
  </div>

  <!-- ============ MENÚ ============ -->
  <div id="menuPanel">
    <button id="closeMenu">✕</button>
    <h3>Visitar lugares</h3>
    <div id="menuList"></div>
  </div>

  <!-- ============ OVERLAY FOTO ============ -->
  <div class="overlay" id="photoOverlay">
    <div class="closeX" id="closePhoto">✕</div>
    <figure class="polaroid-big">
      <img class="ph" id="photoImg" src="" alt="Foto" style="display:none;width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:2px;">
      <figcaption id="photoCaption">—</figcaption>
      <div class="why" id="photoWhy">—</div>
    </figure>
  </div>

  <!-- ============ OVERLAY CARTA ============ -->
  <div class="overlay" id="letterOverlay">
    <div class="closeX" id="closeLetter">✕</div>
    <div class="letter-card">
      <div class="sprig">
        <svg viewBox="0 0 60 40">
          <path d="M30,38 C30,26 30,14 30,4" fill="none" stroke="#7C9A6C" stroke-width="2"/>
          <ellipse cx="18" cy="14" rx="10" ry="4" fill="#7C9A6C" transform="rotate(-30 18 14)"/>
          <ellipse cx="42" cy="14" rx="10" ry="4" fill="#7C9A6C" transform="rotate(30 42 14)"/>
          <circle cx="30" cy="4" r="5" fill="#C99DA3"/>
        </svg>
      </div>
      <!-- 🔧 nombre -->
      <h2 id="letterGreeting">Querida Elize,</h2>
      <!-- 🔧 Reemplaza estos párrafos por tu carta completa -->
      <div id="letterBody"></div>
      <div class="signature" id="letterSignature">Con todo mi amor</div>
      <div class="seal">✦</div>
    </div>
  </div>

  <div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>
